# 数据源配置
spring:
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    # 主库数据源
    master:
      jdbc-url: jdbc:mysql://127.0.0.1:3306/lshop?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
      username: root
      password: '123456'
      pool-name: hikariCP
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 600000
      max-lifetime: 600000
      connection-timeout: 5000
      connection-test-query: SELECT 1
    # 从库数据源
    slave:
      # 从数据源开关/默认关闭
      enabled: false
      url:
      username:
      password:

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456
      database: 0
      timeout: 300
      lettuce:
        shutdown-timeout: 100ms
  #配置rabbitMq 服务器
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    # 消息确认配置项
    # 确认消息已发送到交换机(Exchange)
    publisher-confirm-type: correlated
    # 确认消息已发送到队列(Queue)
    publisher-returns: true
    listener:
      simple:
        # 一个消费者最多可处理的nack（未确认）消息数量
        prefetch: 1
        acknowledge-mode: manual  # 消息确认方式，其有三种配置方式，分别是none、manual(手动ack) 和auto(自动ack) 默认auto
sms:
  danmi:
    account-sid: your-account-sid
    auth-token: your-auth-token
    account-id: your-account-id
    api-url: https://openapi.danmi.com/textSMS/sendSMS/V3
    enabled: true

es:
  config:
    host: 127.0.0.1
    port: 9200
    username: 
    password: 
    scheme: http
    shards: 3
    replicas: 2

# wx支付配置
